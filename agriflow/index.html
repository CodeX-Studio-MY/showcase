<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agriflow — AI-Powered Smart Irrigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .login-bg {
            background:
                radial-gradient(circle at 20% 20%, rgba(22, 163, 74, 0.10), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(15, 118, 110, 0.10), transparent 50%),
                linear-gradient(135deg, #f0fdf4 0%, #f8fafc 100%);
        }

        .bagua-bg {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><polygon points='100,10 159,38 187,100 159,162 100,190 41,162 13,100 41,38' fill='none' stroke='%2316a34a' stroke-width='1' opacity='0.08'/></svg>");
            background-repeat: repeat;
            background-size: 220px 220px;
        }
    </style>
</head>

<body class="login-bg bagua-bg min-h-screen flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-10 border border-slate-100">
        <div class="flex items-center justify-center gap-3 mb-2">
            <img src="assets/logo.svg" alt="Agriflow" class="w-12 h-12" />
            <div class="text-3xl font-bold text-slate-900 tracking-tight">Agriflow</div>
        </div>
        <p class="text-center text-sm text-teal-700 font-medium mb-8">AI-Powered Smart Irrigation</p>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Username</label>
                <input id="username" type="text" autocomplete="username" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Password</label>
                <input id="password" type="password" autocomplete="current-password" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" />
            </div>
            <div id="errorBox" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-semibold py-2.5 rounded-lg shadow-sm shadow-green-600/20 transition">
                Sign In
            </button>
            <p class="text-[11px] text-center text-slate-400">Demo credentials: <span class="font-mono">admin / admin</span></p>
        </form>
    </div>
    <p class="mt-6 text-xs text-slate-400">© 2026 Agriflow. All rights reserved.</p>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorBox');
            if (u === 'admin' && p === 'admin') {
                localStorage.setItem('agriflow_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                err.textContent = 'Invalid credentials';
                err.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
